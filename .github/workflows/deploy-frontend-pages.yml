name: Deploy Frontend To Cloudflare Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - "**/web/**"
      - "**/deploy-frontend-pages.yml"
  workflow_dispatch:

jobs:
  deploy:
    environment: Guangzhou
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect web directory
        run: |
          if [ -d "new-api/web" ]; then
            echo "WEB_DIR=new-api/web" >> "$GITHUB_ENV"
          elif [ -d "web" ]; then
            echo "WEB_DIR=web" >> "$GITHUB_ENV"
          else
            echo "Cannot find web directory (expected web/ or new-api/web/)." >&2
            exit 1
          fi

      - name: Detect npm lockfile
        id: lockfile
        run: |
          if [ -f "${WEB_DIR}/package-lock.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node (with npm cache)
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.WEB_DIR }}/package-lock.json

      - name: Setup Node (without cache)
        if: steps.lockfile.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (npm ci)
        if: steps.lockfile.outputs.exists == 'true'
        working-directory: ./${{ env.WEB_DIR }}
        run: npm ci

      - name: Install deps (npm install)
        if: steps.lockfile.outputs.exists != 'true'
        working-directory: ./${{ env.WEB_DIR }}
        run: npm install

      - name: Build Web
        working-directory: ./${{ env.WEB_DIR }}
        env:
          VITE_REACT_APP_SERVER_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT }}
          directory: ./${{ env.WEB_DIR }}/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
