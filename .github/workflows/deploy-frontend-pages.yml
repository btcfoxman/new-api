name: Deploy Frontend To Cloudflare Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - "new-api/web/**"
      - "new-api/.github/workflows/deploy-frontend-pages.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: new-api/web/package-lock.json

      - name: Install and Build Web
        working-directory: ./new-api/web
        env:
          VITE_REACT_APP_SERVER_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT }}
          directory: ./new-api/web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
